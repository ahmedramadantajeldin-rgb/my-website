<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ME307 — محاضرات وشيتات التصميم الميكانيكي</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Cairo', sans-serif;
    background: linear-gradient(150deg, #f0f2f5 0%, #e8edf3 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }

  .hero {
    text-align: center;
    margin-bottom: 60px;
  }

  .hero .badge {
    display: inline-block;
    background: #1a2744;
    color: #f5c842;
    padding: 6px 22px;
    border-radius: 30px;
    font-size: 0.85rem;
    font-weight: 700;
    margin-bottom: 24px;
    letter-spacing: 0.5px;
  }

  .hero h1 {
    font-size: 2.8rem;
    font-weight: 900;
    color: #1a2744;
    line-height: 1.5;
    margin-bottom: 14px;
  }

  .hero .subtitle {
    font-size: 1.1rem;
    color: #6b7280;
    font-weight: 400;
  }

  .cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 32px;
    max-width: 700px;
    width: 100%;
  }

  .card {
    background: #ffffff;
    border-radius: 16px;
    padding: 48px 36px;
    text-align: center;
    text-decoration: none;
    color: inherit;
    box-shadow: 0 4px 24px rgba(0,0,0,0.07);
    border: 2px solid transparent;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 5px;
    border-radius: 16px 16px 0 0;
    transition: height 0.3s ease;
  }

  .card:hover {
    transform: translateY(-6px);
    box-shadow: 0 12px 40px rgba(0,0,0,0.12);
  }

  .card:hover::before {
    height: 8px;
  }

  .card-lectures::before { background: linear-gradient(135deg, #1a2744, #2d4a7a); }
  .card-sheets::before  { background: linear-gradient(135deg, #c0440a, #e06428); }

  .card:hover.card-lectures { border-color: #1a2744; }
  .card:hover.card-sheets   { border-color: #c0440a; }

  .card .icon {
    font-size: 3.4rem;
    margin-bottom: 18px;
    display: block;
  }

  .card h2 {
    font-size: 1.5rem;
    font-weight: 800;
    margin-bottom: 10px;
  }

  .card-lectures h2 { color: #1a2744; }
  .card-sheets h2   { color: #c0440a; }

  .card p {
    font-size: 0.95rem;
    color: #6b7280;
    line-height: 1.6;
  }

  .footer {
    margin-top: 60px;
    text-align: center;
    color: #9ca3af;
    font-size: 0.82rem;
  }

  @media (max-width: 640px) {
    .hero h1 { font-size: 2rem; }
    .cards { gap: 20px; }
    .card { padding: 36px 24px; }
  }
</style>
</head>
<body>

  <div class="hero">
    <span class="badge">ME307 · Machine Design</span>
    <h1>محاضرات وشيتات التصميم الميكانيكي</h1>
    <p class="subtitle">كل المحاضرات والشيتات في مكان واحد — اختر القسم اللي عايزه</p>
  </div>

  <div class="cards">
    <a href="lectures.html" class="card card-lectures" id="lectures-card">
      <span class="icon">📖</span>
      <h2>المحاضرات</h2>
      <p>7 محاضرات شاملة من Lecture 1 لـ Lecture 7</p>
    </a>

    <a href="sheets.html" class="card card-sheets" id="sheets-card">
      <span class="icon">📝</span>
      <h2>الشيتات</h2>
      <p>6 شيتات حلول من Sheet 1 لـ Sheet 6</p>
    </a>
  </div>

  <div class="footer">
    MUST University · Faculty of Engineering · Mechanical Department
  </div>

</body>
</html>
