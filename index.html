<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Machine Design — ME307</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,800;1,700&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html { font-size: 16px; scroll-behavior: smooth; }

  body {
    font-family: 'Jost', sans-serif;
    background: #EEEAE3;
    color: #1A1A1A;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    -webkit-font-smoothing: antialiased;
  }

  /* ── PAGE WRAPPER ── */
  .site-wrap {
    max-width: 640px;
    margin: 0 auto;
    padding: 68px 28px 56px;
    flex: 1;
    width: 100%;
  }

  /* ── HEADER ── */
  .header {
    text-align: center;
    margin-bottom: 44px;
  }

  .course-label {
    font-size: 10.5px;
    font-weight: 600;
    letter-spacing: 3.5px;
    text-transform: uppercase;
    color: #9A6B3A;
    margin-bottom: 18px;
  }

  .course-title {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: clamp(44px, 10vw, 70px);
    font-weight: 800;
    line-height: 1;
    letter-spacing: -1px;
    color: #1A1A1A;
    margin-bottom: 12px;
  }

  .course-title em {
    font-style: italic;
    color: #9A6B3A;
    font-weight: 700;
  }

  .course-subtitle {
    font-size: 13px;
    font-weight: 300;
    letter-spacing: 0.4px;
    color: #7A7167;
    margin-bottom: 26px;
  }

  .header-rule {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }
  .header-rule::before,
  .header-rule::after {
    content: '';
    display: block;
    width: 44px;
    height: 1px;
    background: #C8BEB2;
  }
  .header-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: #9A6B3A;
  }

  /* ── TAB NAV ── */
  .tab-nav {
    display: flex;
    justify-content: center;
    gap: 0;
    margin-bottom: 36px;
    border: 1px solid #D8D2C8;
    border-radius: 6px;
    overflow: hidden;
    background: #F4F0E9;
  }

  .tab-btn {
    flex: 1;
    padding: 10px 0;
    font-family: 'Jost', sans-serif;
    font-size: 10.5px;
    font-weight: 600;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: #9A9189;
    background: transparent;
    border: none;
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
    border-right: 1px solid #D8D2C8;
  }
  .tab-btn:last-child { border-right: none; }

  .tab-btn.active {
    background: #1A1A1A;
    color: #EEEAE3;
  }

  .tab-btn:not(.active):hover {
    background: #E5E0D8;
    color: #4A4640;
  }

  /* ── SECTION LABEL ── */
  .section-label {
    font-size: 9.5px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #9A9189;
    margin-bottom: 14px;
    padding-left: 2px;
  }

  /* ── ROW LIST ── */
  .row-list {
    display: flex;
    flex-direction: column;
  }

  .row-item {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 16px 18px;
    background: #F4F0E9;
    border: 1px solid #E0D9CF;
    border-radius: 7px;
    margin-bottom: 9px;
    text-decoration: none;
    color: inherit;
    cursor: pointer;
    transition: background 0.18s, border-color 0.18s, transform 0.14s;
  }
  .row-item:last-child { margin-bottom: 0; }

  .row-item:hover {
    background: #ECE7DE;
    border-color: #C4BAB0;
    transform: translateX(3px);
  }

  .row-num {
    font-size: 10.5px;
    font-weight: 600;
    color: #B0A89E;
    letter-spacing: 0.5px;
    width: 18px;
    flex-shrink: 0;
    text-align: right;
  }

  .row-icon {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .row-icon svg {
    width: 16px;
    height: 16px;
    stroke-width: 1.8;
    stroke-linecap: round;
    stroke-linejoin: round;
    fill: none;
  }

  /* icon palette cycling */
  .row-item:nth-child(8n+1) .row-icon { background:#DCE8F5; } .row-item:nth-child(8n+1) .row-icon svg { stroke:#4A7AAF; }
  .row-item:nth-child(8n+2) .row-icon { background:#F5EDDC; } .row-item:nth-child(8n+2) .row-icon svg { stroke:#AF8040; }
  .row-item:nth-child(8n+3) .row-icon { background:#DCF0E8; } .row-item:nth-child(8n+3) .row-icon svg { stroke:#3D9E72; }
  .row-item:nth-child(8n+4) .row-icon { background:#F5DCDC; } .row-item:nth-child(8n+4) .row-icon svg { stroke:#B04A4A; }
  .row-item:nth-child(8n+5) .row-icon { background:#EAE0F5; } .row-item:nth-child(8n+5) .row-icon svg { stroke:#7050A8; }
  .row-item:nth-child(8n+6) .row-icon { background:#F5F0DC; } .row-item:nth-child(8n+6) .row-icon svg { stroke:#A89040; }
  .row-item:nth-child(8n+7) .row-icon { background:#DCF0F5; } .row-item:nth-child(8n+7) .row-icon svg { stroke:#3D8E9E; }
  .row-item:nth-child(8n+0) .row-icon { background:#F5DCF0; } .row-item:nth-child(8n+0) .row-icon svg { stroke:#A04080; }

  .row-text { flex: 1; min-width: 0; }

  .row-name {
    font-size: 14px;
    font-weight: 600;
    color: #1A1A1A;
    margin-bottom: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .row-desc {
    font-size: 11px;
    font-weight: 400;
    color: #9A9189;
  }

  .row-arrow {
    font-size: 15px;
    color: #C0B8AE;
    flex-shrink: 0;
    transition: color 0.18s;
  }
  .row-item:hover .row-arrow { color: #6A6460; }

  /* ── HOME PAGE: 2 big option rows ── */
  .home-option {
    display: flex;
    align-items: center;
    gap: 18px;
    padding: 22px 20px;
    background: #F4F0E9;
    border: 1px solid #E0D9CF;
    border-radius: 8px;
    margin-bottom: 12px;
    cursor: pointer;
    transition: background 0.18s, border-color 0.18s, transform 0.14s;
  }
  .home-option:last-child { margin-bottom: 0; }
  .home-option:hover {
    background: #E8E3DA;
    border-color: #B8AFA5;
    transform: translateX(3px);
  }

  .home-option-icon {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .home-option-icon svg {
    width: 20px;
    height: 20px;
    stroke-width: 1.7;
    stroke-linecap: round;
    stroke-linejoin: round;
    fill: none;
  }

  .home-option:nth-child(1) .home-option-icon { background: #DCE8F5; }
  .home-option:nth-child(1) .home-option-icon svg { stroke: #4A7AAF; }
  .home-option:nth-child(2) .home-option-icon { background: #F5EDDC; }
  .home-option:nth-child(2) .home-option-icon svg { stroke: #AF8040; }

  .home-option-text { flex: 1; }

  .home-option-title {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    font-weight: 800;
    color: #1A1A1A;
    margin-bottom: 3px;
  }

  .home-option-sub {
    font-size: 11.5px;
    font-weight: 400;
    color: #9A9189;
  }

  .home-option-count {
    font-family: 'Playfair Display', serif;
    font-size: 32px;
    font-weight: 800;
    color: #D0C8BE;
    line-height: 1;
    flex-shrink: 0;
  }

  /* ── PAGE visibility ── */
  .page { display: none; }
  .page.active { display: block; }

  /* ── FOOTER ── */
  footer {
    text-align: center;
    padding: 22px 28px 30px;
    border-top: 1px solid #DDD8D0;
    margin-top: auto;
  }
  .footer-text {
    font-size: 11px;
    font-weight: 400;
    color: #AFA89E;
    letter-spacing: 0.3px;
  }
  .footer-text strong { color: #9A6B3A; font-weight: 600; }

  /* ── RESPONSIVE ── */
  @media (max-width: 480px) {
    .site-wrap { padding: 48px 18px 44px; }
    .row-item, .home-option { gap: 12px; padding: 14px 14px; }
    .row-name, .home-option-title { font-size: 13px; }
  }
</style>
</head>
<body>

<div class="site-wrap">

  <!-- HEADER -->
  <header class="header">
    <p class="course-label">Machine Design</p>
    <h1 class="course-title">ME<em>307</em></h1>
    <p class="course-subtitle">Lecture Notes &amp; Problem Sheets</p>
    <div class="header-rule"><div class="header-dot"></div></div>
  </header>

  <!-- TAB NAV -->
  <nav class="tab-nav">
    <button class="tab-btn active" onclick="showPage('home')">Home</button>
    <button class="tab-btn" onclick="showPage('lectures')">Lectures</button>
    <button class="tab-btn" onclick="showPage('sheets')">Sheets</button>
  </nav>

  <!-- ── PAGE: HOME ── -->
  <div class="page active" id="page-home">
    <p class="section-label">Select Section</p>
    <div class="row-list">

      <div class="home-option" onclick="showPage('lectures')">
        <div class="home-option-icon">
          <svg viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
        </div>
        <div class="home-option-text">
          <div class="home-option-title">Lectures</div>
          <div class="home-option-sub">Theory, derivations &amp; key concepts · 8 lectures</div>
        </div>
        <div class="home-option-count">8</div>
      </div>

      <div class="home-option" onclick="showPage('sheets')">
        <div class="home-option-icon">
          <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        </div>
        <div class="home-option-text">
          <div class="home-option-title">Sheets</div>
          <div class="home-option-sub">Model answers &amp; full solutions · 7 sheets</div>
        </div>
        <div class="home-option-count">7</div>
      </div>

    </div>
  </div>

  <!-- ── PAGE: LECTURES ── -->
  <div class="page" id="page-lectures">
    <p class="section-label">Lectures</p>
    <div class="row-list" id="lecturesGrid"></div>
  </div>

  <!-- ── PAGE: SHEETS ── -->
  <div class="page" id="page-sheets">
    <p class="section-label">Sheets</p>
    <div class="row-list" id="sheetsGrid"></div>
  </div>

</div><!-- /site-wrap -->

<!-- FOOTER -->
<footer>
  <p class="footer-text"><strong>ME307</strong> · Machine Design &nbsp;·&nbsp; All rights reserved</p>
</footer>


<script>
/* ── DATA ── */
const LECTURES = [
  { num:"01", title:"Engineering Materials",            desc:"Classification, mechanical characteristics & material selection",  link:"lecture1.html" },
  { num:"02", title:"Fits & Tolerances",                desc:"ISO systems · Clearance & interference fits · GD&T",               link:"lecture2.html" },
  { num:"03", title:"Stresses in Machine Members",      desc:"Tensile, compressive & shear stresses · Combined loading",         link:"lecture3.html" },
  { num:"04", title:"Simple Stress in Machine Design",  desc:"Direct stress · Bearing stress · Factor of safety",                link:"lecture4.html" },
  { num:"05", title:"Stresses in Members — Part II",    desc:"Mohr's circle · Principal stresses · Combined bending & torsion",  link:"lecture5.html" },
  { num:"06", title:"Riveted Joints",                   desc:"Joint types · Strength calculations · Efficiency & failure modes",  link:"lecture6.html" },
  { num:"07", title:"Design of Shafts & Keys",          desc:"Torque transmission · Keyway stresses · Combined loads",           link:"lecture7.html" },
  { num:"08", title:"Shaft Design",                     desc:"Deflection · Critical speed · ASME code-based methodology",        link:"lecture8.html" },
];

const SHEETS = [
  { num:"01", title:"Engineering Materials",       desc:"Material properties · Classification · Mechanical testing",             link:"sheet1.html" },
  { num:"02", title:"Limits, Fits & Tolerances",   desc:"ISO tolerance systems · Clearance fits · Tolerance stack-up",          link:"sheet2.html" },
  { num:"03", title:"Stresses in Machine Members", desc:"Tensile, compressive & shear stress calculations",                     link:"sheet3.html" },
  { num:"04", title:"Torsional & Bending Stresses",desc:"Shaft moments · Beam stresses · Column design problems",               link:"sheet4.html" },
  { num:"05", title:"Bending & Torsional Stresses",desc:"Mohr's circle applications · Principal stresses · Safe design",        link:"sheet5.html" },
  { num:"06", title:"Riveted Joints",              desc:"Joint strength · Efficiency calculations · Failure mode analysis",      link:"sheet6.html" },
  { num:"07", title:"Shaft Design",                desc:"Torque transmission · Hollow vs solid · Combined bending & torsion",   link:"sheet7.html" },
];

/* icons for lecture rows */
const ICONS = [
  `<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`,
  `<svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>`,
  `<svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>`,
  `<svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>`,
  `<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>`,
  `<svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>`,
  `<svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>`,
  `<svg viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>`,
];

/* ── RENDER ── */
function makeRow(item, i) {
  const icon = ICONS[i % ICONS.length];
  return `
    <a class="row-item" href="${item.link}">
      <span class="row-num">${item.num}</span>
      <div class="row-icon">${icon}</div>
      <div class="row-text">
        <div class="row-name">${item.title}</div>
        <div class="row-desc">${item.desc}</div>
      </div>
      <span class="row-arrow">→</span>
    </a>`;
}

document.getElementById('lecturesGrid').innerHTML = LECTURES.map((l,i) => makeRow(l,i)).join('');
document.getElementById('sheetsGrid').innerHTML   = SHEETS.map((s,i) => makeRow(s,i)).join('');

/* ── PAGE SWITCHING ── */
const PAGES = ['home','lectures','sheets'];

function showPage(id) {
  PAGES.forEach(p => {
    document.getElementById(`page-${p}`).classList.toggle('active', p === id);
  });
  document.querySelectorAll('.tab-btn').forEach((btn, i) => {
    btn.classList.toggle('active', PAGES[i] === id);
  });
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

/* ── RESTORE LAST PAGE ── */
(function() {
  const saved = localStorage.getItem('me307_page');
  if (saved && PAGES.includes(saved)) {
    showPage(saved);
    localStorage.removeItem('me307_page');
  }
})();
</script>
</body>
</html>
